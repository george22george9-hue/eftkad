<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAN3A - Graphic Design</title>
    <!-- استدعاء أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- خطوط جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* المتغيرات وإعدادات أساسية */
        :root {
            --bg-color: #050505;
            --text-light: #ffffff;
            --blue-gradient: linear-gradient(180deg, #10377a 0%, #5cb3ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            overflow-x: hidden;
            position: relative;
        }

        /* الأشكال الخلفية المتحركة */
        .bg-shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite ease-in-out alternate;
        }
        .shape1 {
            width: 40vw;
            height: 40vw;
            max-width: 400px;
            max-height: 400px;
            background: #2a69ff;
            top: -100px;
            left: -100px;
            border-radius: 50%;
            opacity: 0.4;
        }
        .shape2 {
            width: 30vw;
            height: 30vw;
            max-width: 300px;
            max-height: 300px;
            background: #00c3ff;
            bottom: -50px;
            right: -50px;
            border-radius: 50%;
            opacity: 0.3;
            animation-delay: -5s;
        }

        /* شريط التنقل (اللوجو) */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 5%;
            width: 100%;
            position: relative;
            z-index: 10;
            animation: fadeInDown 1s ease-out forwards;
        }

        .brand-logo {
            width: 100%;
            max-width: 250px; /* حجم اللوجو على اللابتوب */
            height: auto;
            /* هذه الخدعة تحول اللوجو الأسود بخلفية بيضاء إلى أبيض بخلفية شفافة ليتناسب مع الموقع */
            filter: invert(1) brightness(2) contrast(1.2); 
            transition: transform 0.3s ease;
        }
        
        .brand-logo:hover {
            transform: scale(1.05);
        }

        /* القسم الأول (الهيرو) */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2% 10% 5%;
            min-height: 60vh;
            gap: 3rem;
            flex-wrap: wrap;
        }

        /* تأثير الزجاج */
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.01));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 4rem;
            flex: 1;
            min-width: 300px;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: slideInLeft 1s ease-out forwards;
            opacity: 0;
        }

        .glass-card h1 {
            font-size: clamp(2.5rem, 5vw, 4rem); /* حجم خط متجاوب */
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .glass-card p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #5cb3ff;
        }

        /* صورة اللابتوب/التابلت */
        .hero-image {
            flex: 1;
            min-width: 300px;
            animation: slideInRight 1.2s ease-out forwards;
            opacity: 0;
            position: relative;
            display: flex;
            justify-content: center;
        }
        .hero-image img {
            width: 100%;
            max-width: 600px;
            border-radius: 20px;
            transform: perspective(1000px) rotateY(-15deg);
            box-shadow: -20px 20px 40px rgba(0,0,0,0.7);
            transition: transform 0.5s ease;
        }
        .hero-image img:hover {
            transform: perspective(1000px) rotateY(0deg) scale(1.05);
        }

        /* قسم الخدمات */
        .services-section {
            padding: 5% 10% 10%;
            text-align: center;
        }

        .services-section h2 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 400;
            margin-bottom: 4rem;
            animation: fadeInUp 1s ease-out forwards;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        .service-card {
            background: var(--blue-gradient);
            border-radius: 25px;
            padding: 3rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 150, 255, 0.2);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(50px);
        }

        .service-card:nth-child(1) { animation: fadeUpCard 0.8s ease-out 0.3s forwards; }
        .service-card:nth-child(2) { animation: fadeUpCard 0.8s ease-out 0.5s forwards; }
        .service-card:nth-child(3) { animation: fadeUpCard 0.8s ease-out 0.7s forwards; }

        .service-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 20px 40px rgba(42, 105, 255, 0.5);
            z-index: 2;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg);
            transition: 0.7s;
        }
        .service-card:hover::before {
            left: 150%;
        }

        .service-card i {
            font-size: clamp(3rem, 5vw, 4rem);
            color: #fff;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .service-card h3 {
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.4;
        }

        /* زر الواتساب العائم */
        .whatsapp-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.5);
            z-index: 1000;
            animation: pulse-whatsapp 2s infinite;
            transition: all 0.3s ease;
        }

        .whatsapp-btn:hover {
            transform: scale(1.1) rotate(10deg);
            background-color: #20b858;
        }

        /* الأنيميشن (Keyframes) */
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUpCard {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-whatsapp {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* Media Queries - التجاوب مع مختلف الشاشات */
        
        /* التابلت والشاشات المتوسطة */
        @media (max-width: 992px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 5% 5%;
            }
            .glass-card {
                margin: 0 auto;
                padding: 3rem 2rem;
            }
            .hero-image {
                margin-top: 2rem;
            }
            .hero-image img {
                transform: perspective(1000px) rotateY(0deg); /* الغاء الميلان في الشاشات الأصغر ليأخذ مساحة أفضل */
            }
        }

        /* الموبايلات بمختلف أحجامها */
        @media (max-width: 768px) {
            .navbar {
                padding: 1.5rem 5%;
            }
            .brand-logo {
                max-width: 180px; /* تصغير اللوجو للموبايل */
            }
            .services-section {
                padding: 5% 5% 15%;
            }
            .cards-container {
                gap: 1.5rem;
            }
            .service-card {
                padding: 2.5rem 1.5rem;
            }
            .whatsapp-btn {
                width: 55px;
                height: 55px;
                font-size: 2rem;
                bottom: 20px;
                right: 20px;
            }
        }

        /* الموبايلات الصغيرة جداً */
        @media (max-width: 480px) {
            .glass-card {
                padding: 2rem 1.5rem;
            }
            .brand-logo {
                max-width: 150px;
            }
            .service-card i {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- أشكال الخلفية -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <!-- شريط اللوجو (الجديد) -->
    <nav class="navbar">
        <!-- تأكد من حفظ صورة اللوجو باسم logo.png في نفس الفولدر -->
        <img src="logo.png" alt="SAN3A Logo" class="brand-logo">
    </nav>

    <!-- القسم الأول -->
    <header class="hero">
        <div class="glass-card">
            <h1>SAN3A</h1>
            <p>Creative Studio</p> <!-- يمكنك تغيير الجملة كما تشاء -->
        </div>
        <div class="hero-image">
            <!-- صورة توضيحية افتراضية -->
            <img src="https://images.unsplash.com/photo-1561070791-2526d30994b5?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Portfolio Preview">
        </div>
    </header>

    <!-- قسم الخدمات -->
    <section class="services-section">
        <h2>We provide you with everything you need</h2>
        
        <div class="cards-container">
            <!-- الكارت الأول -->
            <div class="service-card">
                <i class="fa-solid fa-network-wired"></i>
                <h3>Complete Visual<br>Identity Design</h3>
            </div>

            <!-- الكارت الثاني -->
            <div class="service-card">
                <i class="fa-solid fa-photo-film"></i>
                <h3>Video Editing</h3>
            </div>

            <!-- الكارت الثالث -->
            <div class="service-card">
                <i class="fa-solid fa-address-card"></i>
                <h3>CV And Portfolio</h3>
            </div>
        </div>
    </section>

    <!-- زر الواتساب -->
    <a href="https://wa.me/201229518750" class="whatsapp-btn" target="_blank" title="Contact Us on WhatsApp">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <!-- سكربت الـ 3D للكروت -->
    <script>
        // إيقاف تأثير الـ Tilt على الموبايل لأنه يعتمد على الماوس
        const isMobile = window.matchMedia("(max-width: 768px)").matches;
        
        if(!isMobile) {
            const cards = document.querySelectorAll('.service-card');
            
            cards.forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    const rotateX = ((y - centerY) / centerY) * -10;
                    const rotateY = ((x - centerX) / centerX) * 10;
                    
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'translateY(-15px) scale(1.03)';
                    setTimeout(() => {
                        card.style.transform = '';
                    }, 100);
                });
            });
        }
    </script>
</body>
</html>
