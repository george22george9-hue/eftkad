<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAN3A - Graphic Design</title>
    <!-- استدعاء أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- خطوط جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* المتغيرات وإعدادات أساسية */
        :root {
            --bg-color: #050505;
            --text-light: #ffffff;
            --blue-gradient: linear-gradient(180deg, #10377a 0%, #5cb3ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            overflow-x: hidden;
            position: relative;
        }

        /* الأشكال الخلفية المتحركة */
        .bg-shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite ease-in-out alternate;
            pointer-events: none;
        }
        .shape1 {
            width: 40vw;
            height: 40vw;
            max-width: 400px;
            max-height: 400px;
            background: #2a69ff;
            top: -100px;
            left: -100px;
            border-radius: 50%;
            opacity: 0.4;
        }
        .shape2 {
            width: 30vw;
            height: 30vw;
            max-width: 300px;
            max-height: 300px;
            background: #00c3ff;
            bottom: -50px;
            right: -50px;
            border-radius: 50%;
            opacity: 0.3;
            animation-delay: -5s;
        }

        /* القسم الأول (الهيرو) */
        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8% 10% 5%;
            min-height: 70vh;
            gap: 2.5rem;
            flex-wrap: wrap;
        }

        /* تأثير الزجاج للكروت */
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.01));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 3rem;
            flex: 1;
            min-width: 280px;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: slideInLeft 1s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            opacity: 0;
        }

        /* أنيميشن تأخير خفيف للكارت الثاني */
        .glass-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .glass-card h1 {
            font-size: clamp(2.2rem, 4.5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #a5d1ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card p {
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #5cb3ff;
        }

        /* صورة اللابتوب/التابلت */
        .hero-image {
            flex: 1.2;
            min-width: 300px;
            animation: slideInRight 1.2s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            opacity: 0;
            position: relative;
            display: flex;
            justify-content: center;
        }
        .hero-image img {
            width: 100%;
            max-width: 550px;
            border-radius: 20px;
            transform: perspective(1000px) rotateY(-15deg);
            box-shadow: -20px 20px 40px rgba(0,0,0,0.7);
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.5s ease;
        }
        .hero-image img:hover {
            transform: perspective(1000px) rotateY(0deg) scale(1.03);
            box-shadow: 0 20px 40px rgba(42, 105, 255, 0.3);
        }

        /* قسم الخدمات */
        .services-section {
            padding: 5% 10% 10%;
            text-align: center;
        }

        .services-section h2 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 400;
            margin-bottom: 4rem;
            animation: fadeInUp 1s ease-out forwards;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        .service-card {
            background: var(--blue-gradient);
            border-radius: 25px;
            padding: 3.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 150, 255, 0.15);
            transition: transform 0.1s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(50px);
        }

        .service-card:nth-child(1) { animation: fadeUpCard 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) 0.3s forwards; }
        .service-card:nth-child(2) { animation: fadeUpCard 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) 0.5s forwards; }
        .service-card:nth-child(3) { animation: fadeUpCard 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) 0.7s forwards; }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-25deg);
            transition: 0.7s;
        }
        .service-card:hover::before {
            left: 150%;
        }

        .service-card i {
            font-size: clamp(3rem, 5vw, 3.8rem);
            color: #fff;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
        }

        .service-card h3 {
            font-size: clamp(1.1rem, 2vw, 1.3rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.4;
        }

        /* زر الواتساب العائم (تم تعديله ليكون في نص الشاشة تحت بالظبط) */
        .whatsapp-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%); /* لضمان التوسيط الأفقي بدقة */
            background-color: #25D366;
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
            z-index: 1000;
            animation: pulse-whatsapp 2s infinite;
            transition: all 0.3s ease;
        }

        .whatsapp-btn:hover {
            transform: translateX(-50%) scale(1.1) rotate(10deg); /* الحفاظ على السنترة أثناء التأثير */
            background-color: #20b858;
        }

        /* الأنيميشن (Keyframes) */
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUpCard {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-whatsapp {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* ==========================================================================
           شغل الريسبونسيف والموبايل من هنا
           ========================================================================== */
        
        /* شاشات التابلت واللاب توب الصغير */
        @media (max-width: 1024px) {
            .hero {
                padding: 10% 5% 5%;
                gap: 2rem;
            }
            .glass-card {
                max-width: 400px;
                padding: 2.5rem;
            }
        }

        /* شاشات الموبايل (أقل من 768px) */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column; /* ترتيب العناصر تحت بعض طوليًا */
                align-items: center;
                text-align: center;
                padding: 15% 5% 5%;
                gap: 1.5rem; /* مسافة مريحة بين الكروت */
            }
            
            .glass-card {
                width: 100%;
                max-width: 90%; /* تملأ الشاشة مع ترك حواف رايقة */
                min-width: unset;
                padding: 2rem 1.5rem;
                border-radius: 30px;
                animation: fadeInUp 1s ease-out forwards; /* تأثير دخول أنعم على الموبايل */
            }

            .glass-card:nth-child(2) {
                animation-delay: 0.1s;
            }

            .hero-image {
                width: 100%;
                min-width: unset;
                margin-top: 1rem;
            }

            .hero-image img {
                max-width: 90%;
                /* إلغاء الـ 3D المائل على الموبايل عشان الصورة تبان واضحة */
                transform: perspective(1000px) rotateY(0deg); 
                box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            }

            .services-section {
                padding: 10% 5% 20%;
            }

            .services-section h2 {
                margin-bottom: 2.5rem;
            }

            .cards-container {
                grid-template-columns: 1fr; /* كارت واحد في كل صف على الموبايل */
                gap: 1.5rem;
                padding: 0 5%;
            }

            .service-card {
                padding: 2.5rem 1.5rem;
                border-radius: 20px;
            }

            .whatsapp-btn {
                width: 55px;
                height: 55px;
                font-size: 1.8rem;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%); /* تظل متسنترة على الموبايل بدقة */
            }
            
            .whatsapp-btn:hover {
                transform: translateX(-50%) scale(1.1) rotate(10deg);
            }
        }

        /* موبايلات صغيرة جداً (أقل من 480px) */
        @media (max-width: 480px) {
            .hero {
                padding-top: 20%;
            }
            .glass-card {
                max-width: 95%;
                padding: 1.8rem 1.2rem;
            }
            .glass-card h1 {
                font-size: 2rem;
            }
            .glass-card p {
                font-size: 0.8rem;
                letter-spacing: 2px;
            }
            .service-card i {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- أشكال الخلفية -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <!-- القسم الأول (الهيرو) -->
    <header class="hero">
        <!-- كارت SAN3A -->
        <div class="glass-card">
            <h1>SAN3A</h1>
            <p>Creative Studio</p>
        </div>

        <!-- كارت George -->
        <div class="glass-card">
            <h1>George</h1>
            <p>Graphic Design</p>
        </div>

        <!-- صورة المعرض -->
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1561070791-2526d30994b5?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Portfolio Preview">
        </div>
    </header>

    <!-- قسم الخدمات -->
    <section class="services-section">
        <h2>We provide you with everything you need</h2>
        
        <div class="cards-container">
            <!-- الكارت الأول -->
            <div class="service-card">
                <i class="fa-solid fa-network-wired"></i>
                <h3>Complete Visual<br>Identity Design</h3>
            </div>

            <!-- الكارت الثاني -->
            <div class="service-card">
                <i class="fa-solid fa-photo-film"></i>
                <h3>Video Editing</h3>
            </div>

            <!-- الكارت الثالث -->
            <div class="service-card">
                <i class="fa-solid fa-address-card"></i>
                <h3>CV And Portfolio</h3>
            </div>
        </div>
    </section>

    <!-- زر الواتساب (المسنتر في المنتصف بالأسفل) -->
    <a href="https://wa.me/201229518750" class="whatsapp-btn" target="_blank" title="Contact Us on WhatsApp">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <!-- سكربت الـ 3D للكروت (بيشتغل على الشاشات الكبيرة بس لضمان الأداء) -->
    <script>
        const isMobile = window.matchMedia("(max-width: 768px)").matches;
        
        if(!isMobile) {
            const cards = document.querySelectorAll('.service-card');
            
            cards.forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    const rotateX = ((y - centerY) / centerY) * -12;
                    const rotateY = ((x - centerX) / centerX) * 12;
                    
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
                });
                
                card.style.transition = 'transform 0.1s ease';

                card.addEventListener('mouseleave', () => {
                    card.style.transition = 'transform 0.5s ease';
                    card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
                });
            });
        }
    </script>
</body>
</html>
